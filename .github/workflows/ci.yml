name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Syntax check
        run: |
          python -m py_compile subvolumize_home.py
          python -m py_compile flatpak_relink_appdata.py
      - name: Run tests
        run: pytest -v

  release:
    # Attach the raw, standalone .py files to the GitHub Release as
    # downloadable assets -- no build/bundling step needed since both
    # tools are already single, dependency-free files. Gives people a
    # stable, versioned curl/wget URL per tag, e.g.:
    #   https://github.com/<owner>/<repo>/releases/latest/download/subvolumize_home.py
    if: startsWith(github.ref, 'refs/tags/')
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            subvolumize_home.py
            flatpak_relink_appdata.py
